<main>
    <aside class="aside-car">
        <img class="mustang" src="ranger.png" alt="mustang">
    </aside>
    <aside class="loginside">
        <div class="login-content">
        <img class="ford-logo" src="ford.png" alt="Logo da Ford">

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <label for="loginForm">Boas-vindas</label>
            <input name="name" type="text" placeholder="Nome"  formControlName="name">
            <input name="password" type="password" placeholder="Senha" formControlName="password">
            @if (mensagemErro()) {
                <div class="alert-error" style="color: red; margin-bottom: 15px;">
                    {{ mensagemErro() }}
                </div>
            }
            <button type="submit" [disabled]="loginForm.invalid || carregando()">
                {{ carregando() ? 'Verificando...' : 'Entrar' }}
            </button>
        </form>
        </div>
    </aside>
</main>
