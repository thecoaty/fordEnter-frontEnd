<main>
    <aside class="aside-car">
        <img class="mustang" src="ranger.png" alt="mustang">
    </aside>
    <aside class="loginside">
        <div class="login-content">
        <img class="ford-logo" src="ford.png" alt="Logo da Ford">

        <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
            <label for="loginForm">Boas-vindas</label>
            <input name="name" type="text" placeholder="Nome" [(ngModel)]="usuario.nome">
            <input name="password" type="password" placeholder="Senha" [(ngModel)]="usuario.senha">
            <p class="erro" *ngIf="mensagemErro">{{mensagemErro}}</p>
            <button type="submit">
                Entrar
            </button>
        </form>
        </div>
    </aside>
</main>
